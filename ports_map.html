    const map = L.map("map").setView([44.0, 15.5], 7);

    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    ports.forEach(p => {
      const color = countryColors[p.country_code] || "#666";
      const marker = L.circleMarker([p.lat, p.lon], {
        radius: 6,
        color: "#fff",
        weight: 1.5,
        fillColor: color,
        fillOpacity: 0.9,
      }).addTo(map);

      const island = p.island ? `<br><span style="color:#666">Island: ${p.island}</span>` : "";
      marker.bindPopup(
        `<strong>${p.name}</strong> <code style="font-size:0.85em">${p.code}</code>${island}`
      );

      marker.bindTooltip(p.name, { permanent: false, direction: "top", offset: [0, -6] });
